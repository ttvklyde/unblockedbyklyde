<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MBK - Math By Klyde</title>
    <!-- Google Fonts: Unbounded & Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        #stars {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        header {
            text-align: center;
            padding: 2rem 0 1rem 0;
            border-bottom: 1px solid #222;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-family: 'Unbounded', Arial, sans-serif;
            font-size: 3rem;
            margin: 0 0 0.5rem 0;
            letter-spacing: 2px;
        }
        nav {
            margin-top: 0.5rem;
        }
        nav a {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            margin: 0 1rem;
            font-family: 'Poppins', Arial, sans-serif;
            transition: border-bottom 0.2s, color 0.2s;
            border-bottom: 2px solid transparent;
        }
        nav a.active, nav a:hover {
            border-bottom: 2px solid currentColor;
        }
        main {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
            z-index: 2;
        }
        .tab-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-box {
            background: rgba(255,255,255,0.07);
            border-radius: 18px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            padding: 2rem 1.5rem;
            min-width: 280px;
            flex: 1 1 480px;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.12);
            transition: background 0.3s, color 0.3s;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        ul li {
            margin-bottom: 0.75rem;
        }
        a {
            color: inherit;
            text-decoration: underline;
            font-family: 'Poppins', Arial, sans-serif;
            transition: color 0.2s;
        }
        a:hover {
            text-decoration: none;
            opacity: 0.7;
        }
        footer {
            text-align: center;
            padding: 1.5rem 0;
            border-top: 1px solid #222;
            font-size: 1rem;
            margin-top: 2rem;
            position: relative;
            z-index: 2;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        .games-grid li {
            margin: 0;
            list-style: none;
            position: relative;
            transition: z-index 0.2s;
            z-index: 1;
        }
        .game-frame-container {
            position: relative;
            transition: transform 0.45s cubic-bezier(.22,1,.36,1), box-shadow 0.45s cubic-bezier(.22,1,.36,1);
            border-radius: 12px;
            overflow: visible;
            background: transparent;
        }
        .games-grid li:hover .game-frame-container {
            transform: scale(1.08);
            z-index: 2;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }
        .games-grid iframe {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            border: none;
            background: #111;
            display: block;
            transition: box-shadow 0.2s;
        }
        .game-info {
            position: absolute;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.85); /* always slightly transparent black */
            color: #fff !important;           /* always white text */
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Poppins', Arial, sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .games-grid li:hover .game-info {
            opacity: 1;
        }
        @media (max-width: 1400px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 900px) {
            .tab-container {
                flex-direction: column;
                gap: 1.5rem;
            }
            main {
                max-width: 98vw;
            }
            .tab-box {
                min-width: unset;
                flex: 1 1 98vw;
            }
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
        #settingsBtn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 10;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-family: 'Poppins',Arial,sans-serif;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }
        #settingsModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
            transition: opacity 0.35s cubic-bezier(.22,1,.36,1);
            opacity: 0;
            pointer-events: none;
        }
        #settingsModal.active {
            display: flex;
            opacity: 1;
            pointer-events: auto;
        }
        #settingsModal .settings-content {
            background: #111;
            padding: 2rem 2.5rem;
            border-radius: 18px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            color: #fff;
            position: relative;
            transform: scale(0.8);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(.22,1,.36,1), opacity 0.35s cubic-bezier(.22,1,.36,1);
        }
        #settingsModal.active .settings-content {
            transform: scale(1);
            opacity: 1;
        }
        #closeSettings {
            margin-top: 1rem;
            padding: 0.4rem 1.2rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-family: 'Poppins',Arial,sans-serif;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }
        #basketHoopModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
            transition: opacity 0.35s cubic-bezier(.22,1,.36,1);
            opacity: 0;
            pointer-events: none;
        }
        #basketHoopModal.active {
            display: flex;
            opacity: 1;
            pointer-events: auto;
        }
        #basketHoopModal .settings-content {
            background: #111;
            padding: 1.5rem 2rem;
            border-radius: 18px;
            max-width: 700px;
            width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            color: #fff;
            position: relative;
            transform: scale(0.8);
            opacity: 0;
            transition: transform 0.35s cubic-bezier(.22,1,.36,1), opacity 0.35s cubic-bezier(.22,1,.36,1);
        }
        #basketHoopModal.active .settings-content {
            transform: scale(1);
            opacity: 1;
        }
        #closeBasketHoop {
            margin-top: 1rem;
            padding: 0.4rem 1.2rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-family: 'Poppins',Arial,sans-serif;
            cursor: pointer;
            transition: background 0.3s, color 0.3s, border 0.3s;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <header>
        <h1>UBK - Unblocked By Klyde</h1>
        <nav>
            <a href="#games" id="tabGames" class="active" onclick="showTab('games');return false;">Games</a>
            <a href="#links" id="tabLinks" onclick="showTab('links');return false;">Other Unblocked Sites</a>
            <a href="#proxy" id="tabProxy" onclick="showTab('proxy');return false;">Proxy</a>
        </nav>
        <button id="settingsBtn">Settings</button>
    </header>
    <div id="settingsModal">
        <div class="settings-content">
            <h2 style="font-family:'Unbounded',Arial,sans-serif;font-size:1.4rem;margin-top:0;">Settings</h2>
            <label style="display:block;margin-bottom:1.2rem;">
                <input type="checkbox" id="toggleStars" style="margin-right:0.5rem;">
                Show Stars Background
            </label>
            <label style="display:block;margin-bottom:1.2rem;">
                Background Color:
                <input type="color" id="bgColorPicker" value="#000" style="margin-left:0.5rem;">
            </label>
            <button id="closeSettings">Close</button>
        </div>
    </div>
    <main>
        <div class="tab-container">
            <div class="tab-box" id="gamesTab">
                <h2>Featured Games</h2>
                <input
                    type="text"
                    id="gameSearch"
                    placeholder="Search games..."
                    style="width:100%;margin-bottom:1.5rem;padding:0.7rem 1rem;border-radius:8px;border:none;font-size:1rem;font-family:'Poppins',Arial,sans-serif;background:rgba(255,255,255,0.12);color:#fff;"
                >
                <ul class="games-grid" id="gamesGrid">
                    <li>
                        <div class="game-frame-container" style="display: flex; flex-direction: column; align-items: center;">
                            <button id="basketHoopBtn" style="background: none; border: none; padding: 0; cursor: pointer;">
                                <img src="basket-hoop.png" alt="Basket Hoop" style="width: 120px; height: 120px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.3); margin-bottom: 0.5rem;">
                            </button>
                        </div>
                    </li>
                </ul>
                <div id="basketHoopModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:200;justify-content:center;align-items:center;">
                    <div class="settings-content" style="background:#111;padding:1.5rem 2rem;border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,0.7);position:relative;max-width:1100px;width:95vw;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                        <button id="closeBasketHoop" style="position:absolute;top:12px;right:12px;padding:0.4rem 1.2rem;border-radius:8px;border:none;background:rgba(255,255,255,0.12);color:#fff;font-family:'Poppins',Arial,sans-serif;cursor:pointer;">Close</button>
                        <iframe
                            id="gameFrame"
                            data-src="./index-gg.html"
                            width="1000"
                            height="700"
                            marginwidth="0"
                            marginheight="0"
                            hspace="0"
                            vspace="0"
                            frameborder="0"
                            scrolling="no"
                            webkitallowfullscreen="true"
                            mozallowfullscreen="true"
                            msallowfullscreen="true"
                            allowfullscreen="true"
                            src="https://d11jzht7mj96rr.cloudfront.net/games/2024/construct/311/basket-hoop/index-gg.html"
                            style="pointer-events: auto; border-radius:12px; background:#111; display:block; margin:0 auto;"
                        ></iframe>
                    </div>
                </div>
            </div>
            <div class="tab-box" id="linksTab" style="display:none;">
                <h2>Rammerhead</h2>
                <ul>
                    <li><a href="https://beans4life.deez.nz/" target="_blank">Rammerhead 1</a></li>
                    <li><a href="https://mathhomework.patrol-x.com/" target="_blank">Rammerhead 2</a></li>
                </ul>
                <h2>Nebulo</h2>
                <ul>
                    <li><a href="https://nebulo.global.ssl.fastly.net/" target="_blank">Nebulo 1</a></li>
                    <li><a href="https://ap-exam.triatlonpacens3e.es/" target="_blank">Nebulo 2</a></li>
                    <li><a href="https://adc.school.dovereducation.org/" target="_blank">Nebulo 3</a></li>
                </ul>
            </div>
            <div class="tab-box" id="proxyTab" style="display:none;">
                <h2>Proxy</h2>
                <div style="position:relative;">
                    <iframe id="proxyFrame" src="https://beans4life.deez.nz/" width="100%" height="800" style="border-radius:12px;border:none;background:#ffffff;"></iframe>
                    <button id="proxyFullscreenBtn" style="position:absolute;top:12px;right:12px;z-index:2;padding:0.4rem 1rem;border-radius:8px;border:none;background:rgba(0,0,0,0.7);color:#fff;font-family:'Poppins',Arial,sans-serif;cursor:pointer;">Fullscreen</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 UBK. All rights reserved.</p>
    </footer>
    <script>
        // Tab switching logic
        function showTab(tab) {
            document.getElementById('gamesTab').style.display = tab === 'games' ? 'block' : 'none';
            document.getElementById('linksTab').style.display = tab === 'links' ? 'block' : 'none';
            document.getElementById('proxyTab').style.display = tab === 'proxy' ? 'block' : 'none';
            document.getElementById('tabGames').classList.toggle('active', tab === 'games');
            document.getElementById('tabLinks').classList.toggle('active', tab === 'links');
            document.getElementById('tabProxy').classList.toggle('active', tab === 'proxy');
            updateTabUnderline();
        }

        // Star particle background
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resize();
            resetStars();
        });
        resize();

        // Star properties
        let numStars = 120;
        let stars = [];
        function createStar() {
            return {
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 1.2 + 0.3,
                dx: (Math.random() - 0.5) * 0.5,
                dy: (Math.random() - 0.5) * 0.5
            };
        }
        function resetStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push(createStar());
            }
        }
        resetStars();

        // Store current star color
        let starColor = "#fff";

        function animateStars() {
            ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < stars.length; i++) {
                let star = stars[i];
                star.x += star.dx * 0.2;
                star.y += star.dy * 0.2;

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, 2 * Math.PI);
                ctx.fillStyle = starColor;
                ctx.globalAlpha = 0.8;
                ctx.fill();
                ctx.globalAlpha = 1;

                // If a star goes off screen, wrap it to the other side
                if (star.x < 0) star.x = w;
                if (star.x > w) star.x = 0;
                if (star.y < 0) star.y = h;
                if (star.y > h) star.y = 0;
            }
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // Change background color and text color based on brightness
        bgColorPicker.oninput = function() {
            document.body.style.background = this.value;

            // Calculate brightness using the luminance formula
            const hex = this.value.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16);
            const g = parseInt(hex.substring(2,4), 16);
            const b = parseInt(hex.substring(4,6), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;

            let tabBorderColor;
            if (brightness > 150) {
                document.body.style.color = "#000";
                document.querySelectorAll('a, h1, h2, nav a, footer, label').forEach(el => {
                    el.style.color = "#000";
                });
                // Do NOT change .game-info color here
                document.querySelectorAll('button').forEach(btn => {
                    btn.style.background = "#fff";
                    btn.style.color = "#000";
                    btn.style.border = "1px solid #ccc";
                });
                tabBorderColor = "#000";
                document.querySelectorAll('.tab-box').forEach(box => {
                    box.style.background = "rgba(0,0,0,0.07)";
                    box.style.border = "1px solid rgba(0,0,0,0.12)";
                });
                document.getElementById('settingsModal').style.background = "rgba(255,255,255,0.6)";
                document.querySelectorAll('.settings-content').forEach(modal => {
                    modal.style.background = "#fff";
                    modal.style.color = "#000";
                });
                starColor = "#000"; // Stars turn black on light background
            } else {
                document.body.style.color = "#fff";
                document.querySelectorAll('a, h1, h2, nav a, footer, label').forEach(el => {
                    el.style.color = "#fff";
                });
                // Do NOT change .game-info color here
                document.querySelectorAll('button').forEach(btn => {
                    btn.style.background = "rgba(255,255,255,0.12)";
                    btn.style.color = "#fff";
                    btn.style.border = "none";
                });
                tabBorderColor = "#fff";
                document.querySelectorAll('.tab-box').forEach(box => {
                    box.style.background = "rgba(255,255,255,0.07)";
                    box.style.border = "1px solid rgba(255,255,255,0.12)";
                });
                document.getElementById('settingsModal').style.background = "rgba(0,0,0,0.6)";
                document.querySelectorAll('.settings-content').forEach(modal => {
                    modal.style.background = "#111";
                    modal.style.color = "#fff";
                });
                starColor = "#fff"; // Stars turn white on dark background
            }
            updateTabUnderline(tabBorderColor);
        };

        // Update tab underline color
        function updateTabUnderline(tabBorderColor) {
            if (!tabBorderColor) {
                // Get current color from active tab
                const activeTab = document.querySelector('nav a.active');
                tabBorderColor = activeTab ? activeTab.style.color || window.getComputedStyle(activeTab).color : "#fff";
            }
            document.querySelectorAll('nav a').forEach(a => {
                a.style.borderBottomColor = "transparent";
                if (a.classList.contains('active')) {
                    a.style.borderBottomColor = tabBorderColor;
                }
            });
        }

        // Initial underline setup
        updateTabUnderline();

        // Settings modal logic
        document.addEventListener('DOMContentLoaded', function() {
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const closeSettings = document.getElementById('closeSettings');
            const toggleStars = document.getElementById('toggleStars');
            const bgColorPicker = document.getElementById('bgColorPicker');
            const starsCanvas = document.getElementById('stars');

            settingsBtn.onclick = () => {
                settingsModal.style.display = 'flex';
                setTimeout(() => {
                    settingsModal.classList.add('active');
                }, 10);
            };
            closeSettings.onclick = () => {
                settingsModal.classList.remove('active');
                setTimeout(() => {
                    settingsModal.style.display = 'none';
                }, 350);
            };

            // Show/hide stars
            toggleStars.checked = true;
            toggleStars.onchange = function() {
                starsCanvas.style.opacity = this.checked ? '1' : '0';
            };

            // Proxy fullscreen button logic
            const proxyFullscreenBtn = document.getElementById('proxyFullscreenBtn');
            const proxyFrame = document.getElementById('proxyFrame');
            proxyFullscreenBtn.onclick = function() {
                if (proxyFrame.requestFullscreen) {
                    proxyFrame.requestFullscreen();
                } else if (proxyFrame.webkitRequestFullscreen) {
                    proxyFrame.webkitRequestFullscreen();
                } else if (proxyFrame.msRequestFullscreen) {
                    proxyFrame.msRequestFullscreen();
                }
            };

            // Game search logic
            const gameSearch = document.getElementById('gameSearch');
            const gamesGrid = document.getElementById('gamesGrid');
            gameSearch.oninput = function() {
                const query = this.value.toLowerCase();
                Array.from(gamesGrid.children).forEach(li => {
                    const info = li.querySelector('.game-info');
                    const title = info ? info.textContent.toLowerCase() : '';
                    li.style.display = title.includes(query) ? '' : 'none';
                });
            };

            // Basket Hoop button logic (centered modal)
            const basketHoopBtn = document.getElementById('basketHoopBtn');
            const basketHoopModal = document.getElementById('basketHoopModal');
            const closeBasketHoop = document.getElementById('closeBasketHoop');
            if (basketHoopBtn && basketHoopModal && closeBasketHoop) {
                basketHoopBtn.onclick = function() {
                    basketHoopModal.style.display = 'flex';
                    setTimeout(() => {
                        basketHoopModal.classList.add('active');
                    }, 10);
                };
                closeBasketHoop.onclick = function() {
                    basketHoopModal.classList.remove('active');
                    setTimeout(() => {
                        basketHoopModal.style.display = 'none';
                    }, 350);
                };
            }
        });
    </script>
</body>
</html>
